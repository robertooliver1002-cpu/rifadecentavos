<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carregando Rifa...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #121212; /* Fundo escuro elegante */
            color: #ffffff;
        }
        .loader {
            border: 4px solid #222;
            border-top: 4px solid #f39c12; /* Cor dourada/laranja premium */
            border-radius: 50%;
            width: 45px;
            height: 45px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h2 { font-weight: 400; font-size: 16px; letter-spacing: 0.5px; color: #bbb; }
    </style>
</head>
<body>

    <div class="loader"></div>
    <h2>Redirecionando para o sistema de bilhetes...</h2>

    <script>
        // 1. Captura os parâmetros da URL antiga
        const urlParams = new URLSearchParams(window.location.search);
        const whats = urlParams.get('whats') || '';

        // 2. 🚨 SUBSTITUA O LINK ABAIXO PELO SEU LINK DO GOOGLE (O QUE TERMINA EM /exec)
        const LINK_OFFICIAL_GOOGLE = "https://script.google.com/macros/s/AKfycbwFETtFyyp8-t1Udil5SgaZf3RRr0-3xNhzUGDi5lOJLiF1kInyC-vECX9gXxv1Sl93/exec";

        // 3. Monta o redirecionamento sem os rastreadores do Instagram
        let urlDestino = LINK_OFFICIAL_GOOGLE;
        if (whats) {
            urlDestino += (LINK_OFFICIAL_GOOGLE.includes('?') ? '&' : '?') + "whats=" + encodeURIComponent(whats);
        }

        // 4. Força a saída do iframe bloqueado do Instagram
        window.location.replace(urlDestino);
    </script>
</body>
</html>
